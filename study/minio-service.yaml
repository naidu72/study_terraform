apiVersion: v1
kind: Service
metadata:
  name: minio-api-service
  namespace: minio
spec:
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app: minio
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: minio-webconsole-service
  namespace: minio
spec:
  ports:
    - port: 9001
      targetPort: 9001
      protocol: TCP
  selector:
    app: minio
  type: ClusterIP
