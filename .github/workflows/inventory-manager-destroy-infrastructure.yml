name: Inventory Manager — Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - pi-cluster
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

env:
  VAULT_ADDR: https://vault.naidu72.info
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    runs-on: [self-hosted, pi5]
    if: ${{ inputs.confirmation == 'DESTROY' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: pipeline

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/minio/credentials access_key_id | AWS_ACCESS_KEY_ID ;
            secret/data/minio/credentials secret_access_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/ghcr/credentials token | TF_VAR_ghcr_token ;
            secret/data/inventory-manager/postgres password | TF_VAR_postgres_password ;
            secret/data/inventory-manager/jwt secret_key | TF_VAR_jwt_secret_key ;
            secret/data/homelab/pi-kubeconfig kubeconfig | PI_KUBECONFIG

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.PI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context || true

      - name: Set Terraform variables
        run: echo "TF_VAR_ghcr_username=naidu72" >> $GITHUB_ENV

      - name: Verify Terraform
        run: |
          which terraform
          terraform --version

      - name: Terraform Init
        working-directory: inventory-manager/terraform/environments/${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: inventory-manager/terraform/environments/${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform destroy -auto-approve \
            -var="kubeconfig_path=/home/naidu/.kube/config" \
            -var="kubeconfig_context=pi-k3s"

      - name: Verify destruction
        run: |
          echo "Checking if resources are destroyed..."
          kubectl get all -n inventory-manager || echo "✅ Namespace destroyed successfully"

      - name: Destruction summary
        run: |
          echo "## Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Infrastructure destroyed" >> $GITHUB_STEP_SUMMARY
          echo "- **State**: Preserved in MinIO" >> $GITHUB_STEP_SUMMARY

  abort:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirmation != 'DESTROY' }}

    steps:
      - name: Abort destroy
        run: |
          echo "❌ Destruction aborted - incorrect confirmation"
          echo "Please type 'DESTROY' exactly to confirm infrastructure destruction"
          exit 1