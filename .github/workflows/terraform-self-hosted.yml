name: Terraform Multi-Workspace (Self-Hosted WSL)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Workspace to deploy (pi, wsl, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - pi
          - wsl
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: '.'

jobs:
  # Pi workspace - runs on GitHub cloud runner
  terraform-plan-pi:
    name: Terraform Plan - Pi
    runs-on: ubuntu-latest
    if: |
      (github.event_name != 'workflow_dispatch') ||
      (github.event.inputs.workspace == 'both') ||
      (github.event.inputs.workspace == 'pi')
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup SSH for Pi
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PI_HOST }} >> ~/.ssh/known_hosts

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Configure Local Backend (CI/CD Override)
        run: |
          # Backup and replace S3 backend with local backend for CI/CD
          mv backend.tf backend.tf.bak
          cat > backend.tf << 'BACKEND_EOF'
          terraform {
            backend "local" {
              path = "terraform-pi.tfstate"
            }
          }
          BACKEND_EOF
          echo "✅ Backend replaced with local backend for CI/CD"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Select Workspace
        run: |
          terraform workspace select pi || terraform workspace new pi
          echo "Selected workspace: $(terraform workspace show)"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=pi.tfplan \
            -no-color

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-pi
          path: ${{ env.WORKING_DIR }}/pi.tfplan
          retention-days: 5

  # WSL workspace - runs on self-hosted runner
  terraform-plan-wsl:
    name: Terraform Plan - WSL
    runs-on: self-hosted
    if: |
      (github.event_name != 'workflow_dispatch') ||
      (github.event.inputs.workspace == 'both') ||
      (github.event.inputs.workspace == 'wsl')
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Configure Local Backend (CI/CD Override)
        run: |
          # Backup and replace S3 backend with local backend for CI/CD
          mv backend.tf backend.tf.bak
          cat > backend.tf << 'BACKEND_EOF'
          terraform {
            backend "local" {
              path = "terraform-wsl.tfstate"
            }
          }
          BACKEND_EOF
          echo "✅ Backend replaced with local backend for CI/CD"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Select Workspace
        run: |
          terraform workspace select wsl || terraform workspace new wsl
          echo "Selected workspace: $(terraform workspace show)"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=wsl.tfplan \
            -no-color

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-wsl
          path: ${{ env.WORKING_DIR }}/wsl.tfplan
          retention-days: 5

  # Apply for Pi
  terraform-apply-pi:
    name: Terraform Apply - Pi
    runs-on: ubuntu-latest
    needs: terraform-plan-pi
    if: |
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')) &&
      ((github.event_name != 'workflow_dispatch') ||
       (github.event.inputs.workspace == 'both') ||
       (github.event.inputs.workspace == 'pi'))
    
    environment:
      name: pi
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup SSH for Pi
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PI_HOST }} >> ~/.ssh/known_hosts

      - name: Configure Local Backend (CI/CD Override)
        run: |
          # Backup and replace S3 backend with local backend for CI/CD
          mv backend.tf backend.tf.bak
          cat > backend.tf << 'BACKEND_EOF'
          terraform {
            backend "local" {
              path = "terraform-pi.tfstate"
            }
          }
          BACKEND_EOF
          echo "✅ Backend replaced with local backend for CI/CD"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Select Workspace
        run: terraform workspace select pi

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-pi
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve pi.tfplan

      - name: Terraform Output
        run: terraform output -json > pi-outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-pi
          path: ${{ env.WORKING_DIR }}/pi-outputs.json
          retention-days: 30

  # Apply for WSL
  terraform-apply-wsl:
    name: Terraform Apply - WSL
    runs-on: self-hosted
    needs: terraform-plan-wsl
    if: |
      ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')) &&
      ((github.event_name != 'workflow_dispatch') ||
       (github.event.inputs.workspace == 'both') ||
       (github.event.inputs.workspace == 'wsl'))
    
    environment:
      name: wsl
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure Local Backend (CI/CD Override)
        run: |
          # Backup and replace S3 backend with local backend for CI/CD
          mv backend.tf backend.tf.bak
          cat > backend.tf << 'BACKEND_EOF'
          terraform {
            backend "local" {
              path = "terraform-wsl.tfstate"
            }
          }
          BACKEND_EOF
          echo "✅ Backend replaced with local backend for CI/CD"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Select Workspace
        run: terraform workspace select wsl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-wsl
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve wsl.tfplan

      - name: Terraform Output
        run: terraform output -json > wsl-outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-wsl
          path: ${{ env.WORKING_DIR }}/wsl-outputs.json
          retention-days: 30
