# .github/workflows/test-runner.yml
name: Test Online Runner

on:
  push:
    # branches: [pipeline]
  workflow_dispatch:

jobs:
  test-cloud-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Runner info
        run: |
          echo "=== Runner Info ==="
          echo "Hostname: $(hostname)"
          echo "OS: $(uname -a)"
          echo "Architecture: $(uname -m)"
          echo "CPU cores: $(nproc)"
          echo "RAM: $(free -h | grep Mem)"
          echo "Disk: $(df -h / | tail -1)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.10.0"
      - name: Install Kubectl
        uses: azure/setup-kubectl@v4
        with: 
          version: latest  
      - name: Tool versions
        run: |
          echo "=== Pre-installed Tools ==="
          docker --version
          kubectl version --client
          python3 --version
          node --version
          aws --version
            terraform --version
      - uses: actions/checkout@v4.2.2
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PI_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Verify cluster
        run: kubectl get nodes

      - name: Deploy nginx
        run: |
          kubectl create deployment nginx \
            --image=nginx:alpine \
            --replicas=1 \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify
        run: kubectl rollout status deployment/nginx          
        
      - name: Simple Docker test
        run: docker run --rm hello-world

      - name: Done
        run: echo "Cloud runner working!"
