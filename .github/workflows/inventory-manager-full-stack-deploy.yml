name: Inventory Manager — Full Stack Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'pi-cluster'
        type: choice
        options:
          - pi-cluster
      force_rebuild:
        description: 'Force rebuild Docker images'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: naidu72/inventory-backend
  FRONTEND_IMAGE: naidu72/inventory-frontend
  VAULT_ADDR: https://vault.naidu72.info
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  build-backend:
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read
    if: ${{ inputs.force_rebuild || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: pipeline

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/ghcr/credentials token | GHCR_TOKEN

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ steps.vault.outputs.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./inventory-manager/app/backend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache,mode=max

  build-frontend:
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read
    if: ${{ inputs.force_rebuild || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: pipeline

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/ghcr/credentials token | GHCR_TOKEN

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ steps.vault.outputs.GHCR_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./inventory-manager/app/frontend
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: pipeline

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/minio/credentials access_key_id | AWS_ACCESS_KEY_ID ;
            secret/data/minio/credentials secret_access_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/ghcr/credentials token | TF_VAR_ghcr_token ;
            secret/data/inventory-manager/postgres password | TF_VAR_postgres_password ;
            secret/data/inventory-manager/jwt secret_key | TF_VAR_jwt_secret_key ;
            secret/data/homelab/pi-kubeconfig kubeconfig | PI_KUBECONFIG

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.PI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context || true

      - name: Set Terraform variables
        run: echo "TF_VAR_ghcr_username=naidu72" >> $GITHUB_ENV

      - name: Verify Terraform
        run: |
          which terraform
          terraform --version

      - name: Terraform Init
        working-directory: inventory-manager/terraform/environments/${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Terraform Plan
        working-directory: inventory-manager/terraform/environments/${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform plan \
            -var="kubeconfig_path=/home/naidu/.kube/config" \
            -var="kubeconfig_context=pi-k3s" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: inventory-manager/terraform/environments/${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve tfplan

      - name: Wait for all pods to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=inventory-manager-backend \
            -n inventory-manager \
            --timeout=300s
          kubectl wait --for=condition=ready pod \
            -l app=inventory-manager-frontend \
            -n inventory-manager \
            --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n inventory-manager
          echo ""
          echo "=== Services ==="
          kubectl get svc -n inventory-manager
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n inventory-manager
          echo ""
          echo "=== Application Health Check ==="
          sleep 15
          curl -f https://inventory-pi.naidu72.info/ && echo "✅ Frontend accessible" || echo "❌ Frontend not accessible"
          curl -f https://inventory-pi.naidu72.info/api/v1/health && echo "✅ Backend API accessible" || echo "❌ Backend API not accessible"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image**: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image**: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Application URL**: https://inventory-pi.naidu72.info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n inventory-manager -o wide >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY