name: Inventory Manager — Backend CI/CD

on:
  push:
    branches: [ pipeline, main, develop ]
    paths:
      - 'inventory-manager/app/backend/**'
      - '.github/workflows/inventory-manager-backend-ci-cd.yml'
  pull_request:
    branches: [ main, pipeline ]
    paths:
      - 'inventory-manager/app/backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: naidu72/inventory-backend
  VAULT_ADDR: https://vault.naidu72.info
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Verify Python
        run: |
          python3 --version
          pip3 --version

      - name: Install system dependencies
        run: sudo apt-get install -y -qq libpq-dev

      - name: Install dependencies
        working-directory: inventory-manager/app/backend
        run: |
          python3 -m venv /tmp/inv-venv
          /tmp/inv-venv/bin/pip install --upgrade pip
          /tmp/inv-venv/bin/pip install -r requirements.txt
          /tmp/inv-venv/bin/pip install pytest pytest-cov pytest-asyncio httpx flake8

      - name: Run linting
        working-directory: inventory-manager/app/backend
        run: |
          /tmp/inv-venv/bin/flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          /tmp/inv-venv/bin/flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        working-directory: inventory-manager/app/backend
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          /tmp/inv-venv/bin/pytest tests/ -v --cov=. --cov-report=term-missing || echo "No tests found, skipping"

  build-and-push:
    needs: test
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pipeline')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: GitHub repository
        run: echo "github.repository=${{ github.repository }}"

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/ghcr/credentials token | GHCR_TOKEN

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ steps.vault.outputs.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./inventory-manager/app/backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, pi5]
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pipeline')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Import Vault Secrets
        id: vault
        uses: hashicorp/vault-action@v3.1.0
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/minio/credentials access_key_id | AWS_ACCESS_KEY_ID ;
            secret/data/minio/credentials secret_access_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/ghcr/credentials token | TF_VAR_ghcr_token ;
            secret/data/inventory-manager/postgres password | TF_VAR_postgres_password ;
            secret/data/inventory-manager/jwt secret_key | TF_VAR_jwt_secret_key ;
            secret/data/homelab/pi-kubeconfig kubeconfig | PI_KUBECONFIG

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ steps.vault.outputs.PI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context || true

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_ghcr_username=naidu72" >> $GITHUB_ENV

      - name: Verify Terraform
        run: |
          which terraform
          terraform --version
          
      - name: Terraform Init
        working-directory: inventory-manager/terraform/environments/pi-cluster
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Terraform Plan
        working-directory: inventory-manager/terraform/environments/pi-cluster
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform plan \
            -var="kubeconfig_path=/home/naidu/.kube/config" \
            -var="kubeconfig_context=pi-k3s" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: inventory-manager/terraform/environments/pi-cluster
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault.outputs.AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve tfplan  
       

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=inventory-manager-backend \
            -n inventory-manager \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n inventory-manager -l app=inventory-manager-backend
          kubectl logs -n inventory-manager -l app=inventory-manager-backend --tail=50


