name: Backend CI/CD

on:
  push:
    branches: [ main, develop, pipeline ]
    paths:
      - 'app/backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: naidu72/inventory-backend
  VAULT_ADDR: https://vault.naidu72.info

# Required for JWT authentication with Vault
permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/backend/requirements.txt

      - name: Install dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run linting
        working-directory: app/backend
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        working-directory: app/backend
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing || echo "No tests found, skipping"

  build-and-push:
    needs: test
    runs-on: [self-hosted, pi5]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pipeline')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/ghcr/credentials token | GHCR_TOKEN

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, pi5]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pipeline')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/minio/credentials access_key_id | AWS_ACCESS_KEY_ID ;
            secret/data/minio/credentials secret_access_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/ghcr/credentials token | TF_VAR_ghcr_token ;
            secret/data/inventory-manager/postgres password | TF_VAR_postgres_password ;
            secret/data/inventory-manager/jwt secret_key | TF_VAR_jwt_secret_key

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_ghcr_username=naidu72" >> $GITHUB_ENV

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: terraform/environments/pi-cluster
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/pi-cluster
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/pi-cluster
        run: terraform apply -auto-approve tfplan

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=inventory-manager-backend \
            -n inventory-manager \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n inventory-manager -l app=inventory-manager-backend
          kubectl logs -n inventory-manager -l app=inventory-manager-backend --tail=50
